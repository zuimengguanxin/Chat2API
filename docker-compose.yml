version: '3.8'

services:
  chat2api:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
      - "8310:8310"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PROXY_PORT=8310
      - SECRET_KEY=${SECRET_KEY:-chat2api-secret-key}
      - SECRET_SALT=${SECRET_SALT:-chat2api-salt}
    restart: unless-stopped
